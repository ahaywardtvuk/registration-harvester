name: Build and publish Docker image
on:
  push:
    #branches: [ main, 'release/[0-9].[0-9]' ]
    branches: trivy-scanning
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"
  pull_request:
    branches: [ main ]
jobs:
  check_project:
    name: Code linting, format checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 
      - name: Install dependencies
        run: python -m pip install --upgrade pip flake8 black hatch   
      - name: Analyse code
        run: flake8 --max-line-length 120 --count --statistics src/
      - name: Check code format
        run: black --check --diff --color src/
  push_to_registry:
    name: Build and push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Checkout project
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 
      - name: Install dependencies
        run: python -m pip install --upgrade pip hatch
      - name: Determine harvester version
        run: |
          hatch version
          echo "HARVESTER_VERSION=$(hatch version)" >> $GITHUB_ENV
      - name: Extract metadata for the Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_ORG || 'eoepca' }}/registration-harvester
      - name: Print metadata for the Docker image
        run: |
          echo "tags=${{ steps.meta.outputs.tags }}"
          echo "labels=${{ steps.meta.outputs.labels }}"
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:          
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          #tags: eoepca/registration-harvester:latest,eoepca/registration-harvester:${{ env.HARVESTER_VERSION }}      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: docker.io/${{ vars.DOCKERHUB_ORG || 'eoepca' }}/registration-harvester:${{ steps.build.outputs.imageid }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'UNKNOWN,MEDIUM,HIGH,CRITICAL'
          scanners: 'vuln,misconfig,secret,license'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'